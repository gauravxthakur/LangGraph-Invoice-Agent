services:
  # --- THE ERP ---
  odoo:
    image: odoo:17.0
    container_name: odoo
    depends_on:
      - db
      - redis-stack
    ports:
      - "8069:8069"
    volumes:
      - D:/odoo_data/addons:/mnt/extra-addons
      - D:/odoo_data/filestore:/var/lib/odoo
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}      # Links to your .env
      - PASSWORD=${POSTGRES_PASSWORD} # Links to your .env

  # --- THE DATABASE ---
  db:
    image: postgres:15
    container_name: db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - D:/odoo_data/postgres:/var/lib/postgresql/data

  # --- THE AI MEMORY ---
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"   # Redis Port
      - "8001:8001"   # RedisInsight Dashboard Port
    restart: always